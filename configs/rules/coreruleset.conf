# OWASP Core Rule Set Integration
# Version: 4.0.0
# Documentation: https://coreruleset.org/

# Enable CRS
SecRuleEngine On

# Include CRS rules
Include @owasp_crs/*.conf

# CRS Configuration
SecAction \
  "id:900110,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.inbound_anomaly_score_threshold=5,\
   setvar:tx.outbound_anomaly_score_threshold=4"

# Paranoia Level (1-4, default: 1)
SecAction \
  "id:900000,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.paranoia_level=1"

# Blocking mode
SecAction \
  "id:900120,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.blocking_paranoia_level=1"

# Allowed HTTP methods
SecAction \
  "id:900200,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# Allowed request content types
SecAction \
  "id:900220,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.allowed_request_content_type=application/x-www-form-urlencoded|multipart/form-data|text/xml|application/xml|application/x-amf|application/json|text/plain'"

# Static resources extensions
SecAction \
  "id:900300,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:'tx.static_extensions=/.jpg/ /.jpeg/ /.png/ /.gif/ /.js/ /.css/ /.ico/ /.svg/ /.webp/'"
