# Custom WAF Rules for Vinahost
# Add custom security rules here

# Block common attack patterns
SecRule REQUEST_URI "@rx (?i)(\/wp-admin\/|\/wp-login\/|\/administrator\/|\/admin\/)" \
    "id:100001,\
    phase:1,\
    block,\
    capture,\
    t:none,\
    msg:'Block common admin paths',\
    tag:'attack-admin',\
    severity:'CRITICAL',\
    setvar:'tx.admin_attack_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block SQL injection attempts
SecRule ARGS "@rx (?i)(\b(SELECT|INSERT|UPDATE|DELETE|DROP|UNION|ALTER|CREATE|TRUNCATE)\b.*\b(FROM|INTO|TABLE|WHERE|SET|VALUES)\b)" \
    "id:100002,\
    phase:2,\
    block,\
    capture,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:lowercase,\
    msg:'SQL Injection Attack Detected',\
    tag:'attack-sqli',\
    severity:'CRITICAL',\
    setvar:'tx.sql_injection_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block XSS attempts
SecRule ARGS "@rx (?i)(<script[^>]*>|javascript:|on\w+\s*=|<img[^>]*onerror)" \
    "id:100003,\
    phase:2,\
    block,\
    capture,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,\
    msg:'XSS Attack Detected',\
    tag:'attack-xss',\
    severity:'CRITICAL',\
    setvar:'tx.xss_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block path traversal
SecRule REQUEST_URI "@rx (?i)(\.\.\/|\.\.\\\\|%2e%2e%2f|%2e%2e\/|\.\.%2f|%2e%2e%5c)" \
    "id:100004,\
    phase:1,\
    block,\
    capture,\
    t:none,t:urlDecodeUni,\
    msg:'Path Traversal Attack Detected',\
    tag:'attack-lfi',\
    severity:'CRITICAL',\
    setvar:'tx.lfi_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block command injection
SecRule ARGS "@rx (?i)(;|\||`|\$\(|\$\{)" \
    "id:100005,\
    phase:2,\
    block,\
    capture,\
    t:none,t:urlDecodeUni,\
    msg:'Command Injection Attack Detected',\
    tag:'attack-rce',\
    severity:'CRITICAL',\
    setvar:'tx.rce_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Rate limiting for sensitive endpoints
SecRule REQUEST_URI "@rx (?i)(\/login|\/signin|\/auth|\/api\/auth)" \
    "id:100006,\
    phase:1,\
    pass,\
    t:none,\
    msg:'Login endpoint detected',\
    tag:'rate-limit',\
    severity:'NOTICE',\
    setvar:'tx.login_endpoint=1'"

# Block suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nikto|sqlmap|nmap|masscan|dirbuster|gobuster|wpscan)" \
    "id:100007,\
    phase:1,\
    block,\
    capture,\
    t:none,\
    msg:'Suspicious Scanner Detected',\
    tag:'automation-scanner',\
    severity:'CRITICAL',\
    setvar:'tx.scanner_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block common exploit patterns
SecRule REQUEST_URI "@rx (?i)(\/phpmyadmin|\/pma|\/mysql|\/dbadmin|\/sql)" \
    "id:100008,\
    phase:1,\
    block,\
    capture,\
    t:none,\
    msg:'Block database admin access attempts',\
    tag:'attack-database',\
    severity:'CRITICAL',\
    setvar:'tx.db_attack_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Protect against HTTP response splitting
SecRule ARGS "@rx (?i)(%0d|%0a|\\r|\\n)" \
    "id:100009,\
    phase:2,\
    block,\
    capture,\
    t:none,t:urlDecodeUni,\
    msg:'HTTP Response Splitting Attack Detected',\
    tag:'attack-http-splitting',\
    severity:'CRITICAL',\
    setvar:'tx.http_splitting_score=+%{tx.critical_anomaly_score}',\
    setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Block XML External Entity (XXE) attacks
SecRule REQUEST_HEADERS:Content-Type "@rx (?i)(application\/xml|text\/xml)" \
    "id:100010,\
    phase:1,\
    chain,\
    t:none,\
    msg:'XML Request Detected - Check for XXE',\
    tag:'attack-xxe',\
    severity:'CRITICAL'"
    SecRule REQUEST_BODY "@rx (?i)(<!DOCTYPE|<!ENTITY|SYSTEM|PUBLIC)" \
        "block,\
        capture,\
        msg:'XXE Attack Detected',\
        setvar:'tx.xxe_score=+%{tx.critical_anomaly_score}',\
        setvar:'tx.inbound_anomaly_score=+%{tx.critical_anomaly_score}'"

# Logging configuration
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|40[0-3]|40[5-9]|4[1-9][0-9])"
SecAuditLogParts ABCFHZ
SecAuditLogType Serial
SecAuditLog /var/log/vinahost-waf/audit.log

# Debug log (optional - comment out in production)
# SecDebugLog /var/log/vinahost-waf/debug.log
# SecDebugLogLevel 3
