# Custom WAF Rules for Vinahost
# Add custom rules here

# Example: Block requests with suspicious user agents
SecRule REQUEST_HEADERS:User-Agent "@rx (?:nikto|sqlmap|nmap|masscan|metasploit)" \
    "id:10001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Malicious tool detected',\
    tag:'attack-tool',\
    severity:'CRITICAL'"

# Example: Block requests with SQL injection patterns in query string
SecRule ARGS "@detectSQLi" \
    "id:10002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL injection attempt detected',\
    tag:'attack-sqli',\
    severity:'CRITICAL'"

# Example: Block requests with XSS patterns
SecRule ARGS "@detectXSS" \
    "id:10003,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS attempt detected',\
    tag:'attack-xss',\
    severity:'CRITICAL'"

# Example: Rate limiting (requires external implementation)
# This is a placeholder - actual rate limiting needs custom logic
SecRule &REQUEST_HEADERS:Host "@gt 0" \
    "id:10004,\
    phase:1,\
    pass,\
    log,\
    msg:'Request received',\
    tag:'monitoring',\
    severity:'INFO'"
